<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0B0F" />
    <meta name="description" content="BM Computer (บ้านมีคอม) - ร้านค้าออนไลน์จำหน่ายอุปกรณ์คอมพิวเตอร์ คอมประกอบ การ์ดจอ ซีพียู โน้ตบุ๊ก" />
    <title>BM Computer | บ้านมีคอม - ร้านอุปกรณ์คอมพิวเตอร์</title>

    <!-- ตั้งธีมก่อน paint กันจอกระพริบ (no-FOUC) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('bm-theme');
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
          var l = localStorage.getItem('bm-lang');
          if (l) document.documentElement.setAttribute('lang', l);
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
